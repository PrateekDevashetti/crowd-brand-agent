services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: brandlayer
    ports:
      - "5433:5432"   # host 5433 → container 5432 (avoids clashing with a local Postgres)
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"   # host 6380 → container 6379 (avoids clashing with a local Redis)

volumes:
  pgdata:
