services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: brandlayer
    ports:
      - "5433:5432"   # host 5433 → container 5432 (avoids clashing with a local Postgres)
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"   # host 6380 → container 6379 (avoids clashing with a local Redis)

  # Brand-agent API — Canopy's fallback brand extractor (primary is canopy-api/Firecrawl).
  api:
    build: .
    restart: unless-stopped
    env_file: .env            # API keys (OpenAI/Anthropic/Gemini/Clerk/DEV_API_KEY)
    environment:              # in-network hostnames override the .env localhost URLs
      PORT: "3002"
      BASE_URL: http://localhost:3002
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/brandlayer
      REDIS_URL: redis://redis:6379
    ports:
      - "3002:3002"
    depends_on:
      - postgres
      - redis

  # Async worker — runs the brand-extraction jobs (required for status → 'ready').
  worker:
    build: .
    restart: unless-stopped
    command: npm run worker
    env_file: .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/brandlayer
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
